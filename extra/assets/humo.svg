<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 290" font-family="Georgia, 'Times New Roman', serif">
  <rect x="0" y="0" width="470" height="290" rx="12" fill="#f4ecd8" stroke="#c8b88a" stroke-width="2"/>
  <text x="235" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#3a3326">Humo: cubrir un avance</text>

  <defs>
    <polygon id="hxs" points="34.64,20 0,40 -34.64,20 -34.64,-20 0,-40 34.64,-20" stroke="#2b2b2b" stroke-width="2"/>
    <marker id="arS1" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3a6b3a"/></marker>
    <marker id="arS2" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#bf4e30"/></marker>
  </defs>

  <use href="#hxs" x="80"  y="140" fill="#e8dca8"/>
  <use href="#hxs" x="149" y="140" fill="#e8dca8"/>
  <use href="#hxs" x="219" y="140" fill="#cfcfcf"/>
  <use href="#hxs" x="288" y="140" fill="#b08968"/>

  <!-- smoke cloud -->
  <g fill="#9a9a9a" opacity="0.85"><circle cx="206" cy="138" r="13"/><circle cx="222" cy="130" r="15"/><circle cx="232" cy="146" r="12"/><circle cx="212" cy="150" r="11"/></g>

  <!-- attacker (advancing) -->
  <rect x="63" y="123" width="34" height="34" rx="4" fill="#6b705c" stroke="#2b2b2b" stroke-width="2"/>
  <text x="80" y="146" text-anchor="middle" font-size="13" fill="#f4ecd8" font-weight="bold">A</text>
  <!-- defender -->
  <rect x="271" y="123" width="34" height="34" rx="4" fill="#7a5230" stroke="#2b2b2b" stroke-width="2"/>
  <text x="288" y="146" text-anchor="middle" font-size="13" fill="#f4ecd8" font-weight="bold">D</text>

  <!-- advance arrow (green) A -> open hex -->
  <path d="M 97 175 L 140 175" fill="none" stroke="#3a6b3a" stroke-width="3" marker-end="url(#arS1)"/>
  <text x="118" y="200" text-anchor="middle" font-size="12" fill="#3a6b3a" font-weight="bold">avanza a cubierto</text>

  <!-- defender LOS blocked -->
  <line x1="288" y1="140" x2="155" y2="140" stroke="#bf4e30" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arS2)"/>
  <g stroke="#bf4e30" stroke-width="4"><line x1="208" y1="105" x2="230" y2="127"/><line x1="230" y1="105" x2="208" y2="127"/></g>

  <text x="219" y="208" text-anchor="middle" font-size="12" fill="#3a3326" font-weight="bold">humo</text>
  <text x="235" y="248" text-anchor="middle" font-size="14" fill="#bf4e30" font-weight="bold">El humo corta la LOS de D → no puede disparar a A</text>
  <text x="235" y="272" text-anchor="middle" font-size="12" font-style="italic" fill="#3a3326">Lanza humo (mortero/granada) y cruza el terreno abierto seguro.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360" font-family="Georgia, 'Times New Roman', serif">
  <rect x="0" y="0" width="500" height="360" rx="12" fill="#eadfb8" stroke="#c8b88a" stroke-width="2"/>
  <text x="250" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#3a3326">«El cruce del trigal» — mapa esquemático</text>

  <!-- woods sides -->
  <rect x="38" y="60" width="80" height="250" rx="8" fill="#6f8f5a"/>
  <rect x="382" y="60" width="80" height="250" rx="8" fill="#6f8f5a"/>
  <g fill="#33502a" opacity="0.5">
    <circle cx="78" cy="110" r="11"/><circle cx="78" cy="160" r="11"/><circle cx="78" cy="210" r="11"/><circle cx="78" cy="260" r="11"/>
    <circle cx="422" cy="110" r="11"/><circle cx="422" cy="160" r="11"/><circle cx="422" cy="210" r="11"/><circle cx="422" cy="260" r="11"/>
  </g>
  <text x="78" y="300" text-anchor="middle" font-size="12" fill="#1f3018" font-weight="bold">bosque</text>
  <text x="422" y="300" text-anchor="middle" font-size="12" fill="#1f3018" font-weight="bold">bosque</text>

  <!-- wheat field (open) -->
  <rect x="118" y="150" width="264" height="110" fill="#e3c84e" opacity="0.85"/>
  <text x="250" y="210" text-anchor="middle" font-size="15" fill="#7a5e10" font-weight="bold">TRIGAL (abierto)</text>
  <text x="250" y="232" text-anchor="middle" font-size="11" fill="#7a5e10" font-style="italic">cruzarlo = peligroso</text>

  <!-- farm objective (top) -->
  <rect x="205" y="66" width="40" height="34" fill="#7a5230" stroke="#2b2b2b"/>
  <polygon points="205,66 225,50 245,66" fill="#5a3c22" stroke="#2b2b2b"/>
  <rect x="255" y="72" width="34" height="28" fill="#8a6a45" stroke="#2b2b2b"/>
  <polygon points="255,72 272,58 289,72" fill="#5a3c22" stroke="#2b2b2b"/>
  <text x="250" y="120" text-anchor="middle" font-size="13" fill="#bf4e30" font-weight="bold">OBJETIVO: la granja (Rojo)</text>
  <!-- defender token -->
  <rect x="222" y="74" width="22" height="22" rx="3" fill="#7a2222" stroke="#f4ecd8"/>
  <text x="233" y="90" text-anchor="middle" font-size="10" fill="#f4ecd8" font-weight="bold">R</text>

  <!-- attacker edge (bottom) -->
  <rect x="118" y="318" width="264" height="26" fill="#3a4a6b" opacity="0.85"/>
  <text x="250" y="336" text-anchor="middle" font-size="12" fill="#f4ecd8" font-weight="bold">Entrada de Azul (atacante)</text>

  <!-- attacker flank arrows -->
  <defs><marker id="arE" markerWidth="10" markerHeight="10" refX="5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#2e5fa3"/></marker></defs>
  <path d="M 160 316 C 110 270, 110 150, 175 110" fill="none" stroke="#2e5fa3" stroke-width="3.5" marker-end="url(#arE)"/>
  <path d="M 340 316 C 390 270, 390 150, 325 110" fill="none" stroke="#2e5fa3" stroke-width="3.5" marker-end="url(#arE)"/>
  <text x="250" y="300" text-anchor="middle" font-size="11" fill="#2e5fa3" font-weight="bold">avanza por los flancos, no de frente</text>
</svg>

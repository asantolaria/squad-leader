<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 340" font-family="Georgia, 'Times New Roman', serif">
  <rect x="0" y="0" width="580" height="340" rx="12" fill="#f4ecd8" stroke="#c8b88a" stroke-width="2"/>
  <text x="290" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#3a3326">Combate de blindados: impacto → penetración → daño</text>

  <defs><marker id="arI" markerWidth="11" markerHeight="11" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3a3326"/></marker></defs>

  <g>
    <rect x="40" y="70" width="150" height="150" rx="10" fill="#8a6d3b" stroke="#2b2b2b"/>
    <text x="115" y="98" text-anchor="middle" font-size="16" fill="#f4ecd8" font-weight="bold">1 · ¿Impacto?</text>
    <text x="115" y="124" text-anchor="middle" font-size="12" fill="#f4ecd8">distancia + DRM</text>
    <text x="115" y="146" text-anchor="middle" font-size="12" fill="#f4ecd8">parado &gt; en marcha</text>
    <text x="115" y="168" text-anchor="middle" font-size="12" fill="#f4ecd8">blanco móvil = difícil</text>
    <text x="115" y="200" text-anchor="middle" font-size="11" fill="#f4ecd8" font-style="italic">(tabla 33.3)</text>

    <rect x="215" y="70" width="150" height="150" rx="10" fill="#6b705c" stroke="#2b2b2b"/>
    <text x="290" y="98" text-anchor="middle" font-size="16" fill="#f4ecd8" font-weight="bold">2 · ¿Penetra?</text>
    <text x="290" y="124" text-anchor="middle" font-size="12" fill="#f4ecd8">penetración vs.</text>
    <text x="290" y="142" text-anchor="middle" font-size="12" fill="#f4ecd8">blindaje del lado</text>
    <text x="290" y="166" text-anchor="middle" font-size="12" fill="#f4ecd8">costado/trasera &gt; frente</text>
    <text x="290" y="186" text-anchor="middle" font-size="12" fill="#f4ecd8">cerca = más penetra</text>
    <text x="290" y="208" text-anchor="middle" font-size="11" fill="#f4ecd8" font-style="italic">(tabla 33.4)</text>

    <rect x="390" y="70" width="150" height="150" rx="10" fill="#bf4e30" stroke="#2b2b2b"/>
    <text x="465" y="98" text-anchor="middle" font-size="16" fill="#f4ecd8" font-weight="bold">3 · Daño</text>
    <text x="465" y="124" text-anchor="middle" font-size="12" fill="#f4ecd8">destruido / ardiendo</text>
    <text x="465" y="146" text-anchor="middle" font-size="12" fill="#f4ecd8">inmovilizado</text>
    <text x="465" y="168" text-anchor="middle" font-size="12" fill="#f4ecd8">arma destruida</text>
    <text x="465" y="190" text-anchor="middle" font-size="12" fill="#f4ecd8">tripulación afectada</text>
  </g>

  <g stroke="#3a3326" stroke-width="3" marker-end="url(#arI)">
    <line x1="192" y1="145" x2="213" y2="145"/>
    <line x1="367" y1="145" x2="388" y2="145"/>
  </g>

  <text x="290" y="262" text-anchor="middle" font-size="14" fill="#3a3326" font-weight="bold">Táctica reina: dispara al costado/trasera, parado y de cerca.</text>
  <text x="290" y="292" text-anchor="middle" font-size="13" font-style="italic" fill="#7a5230">Si fallas el impacto o no penetras, el proyectil rebota: sin efecto.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340" font-family="Georgia, 'Times New Roman', serif">
  <rect x="0" y="0" width="500" height="340" rx="12" fill="#f4ecd8" stroke="#c8b88a" stroke-width="2"/>
  <text x="250" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#3a3326">Apilamiento: fuerza y riesgo</text>

  <!-- cover hex -->
  <polygon points="200.6,160 140,230 79.4,160 79.4,90 140,55 200.6,90" fill="#6f8f5a" stroke="#2b2b2b" stroke-width="2"/>
  <g fill="#33502a" opacity="0.6"><circle cx="110" cy="110" r="9"/><circle cx="165" cy="130" r="10"/><circle cx="120" cy="175" r="8"/></g>

  <!-- stack of counters -->
  <g stroke="#2b2b2b" stroke-width="2">
    <rect x="100" y="150" width="40" height="40" rx="4" fill="#6b705c"/>
    <text x="120" y="175" text-anchor="middle" font-size="12" fill="#f4ecd8" font-weight="bold">4-6-7</text>
    <rect x="113" y="135" width="40" height="40" rx="4" fill="#6b705c"/>
    <text x="133" y="160" text-anchor="middle" font-size="12" fill="#f4ecd8" font-weight="bold">4-6-7</text>
    <rect x="126" y="120" width="40" height="40" rx="4" fill="#4a4f3f"/>
    <text x="146" y="145" text-anchor="middle" font-size="11" fill="#f4ecd8" font-weight="bold">MG</text>
    <rect x="139" y="105" width="40" height="40" rx="4" fill="#7a5230"/>
    <text x="159" y="130" text-anchor="middle" font-size="12" fill="#f4ecd8" font-weight="bold">9-1</text>
  </g>

  <!-- incoming shot -->
  <defs><marker id="arA" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#bf4e30"/></marker></defs>
  <line x1="140" y1="300" x2="140" y2="235" stroke="#bf4e30" stroke-width="4" marker-end="url(#arA)"/>
  <text x="140" y="320" text-anchor="middle" font-size="13" fill="#bf4e30" font-weight="bold">1 disparo → afecta a TODA la pila</text>

  <!-- right notes -->
  <g font-size="14" fill="#3a3326">
    <text x="250" y="95" font-weight="bold" fill="#3a6b3a">✓ Ventajas</text>
    <text x="250" y="118">• Combinas potencia de fuego</text>
    <text x="250" y="140">• El líder ayuda a todo el hex</text>
    <text x="250" y="178" font-weight="bold" fill="#bf4e30">✗ Riesgos</text>
    <text x="250" y="201">• Un buen disparo rompe a varios</text>
    <text x="250" y="223">• Letal si estás al descubierto</text>
    <text x="250" y="262" font-style="italic">Apila en cobertura;</text>
    <text x="250" y="282" font-style="italic">dispérsate en campo abierto.</text>
  </g>
</svg>

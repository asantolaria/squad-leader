<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="Georgia, 'Times New Roman', serif">
  <rect x="0" y="0" width="560" height="320" rx="12" fill="#f4ecd8" stroke="#c8b88a" stroke-width="2"/>
  <text x="280" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#3a3326">Combate cuerpo a cuerpo</text>

  <!-- hex with both sides -->
  <polygon points="190,165 135,230 80,165 80,95 135,60 190,95" fill="#7a5230" stroke="#2b2b2b" stroke-width="2"/>
  <polygon points="135,60 80,95 80,80 135,45 190,80 190,95" fill="#5a3c22"/>
  <!-- attacker counters -->
  <g stroke="#f4ecd8" stroke-width="2">
    <rect x="96" y="120" width="34" height="34" rx="4" fill="#6b705c"/>
    <rect x="110" y="105" width="34" height="34" rx="4" fill="#6b705c"/>
  </g>
  <text x="113" y="143" font-size="11" fill="#f4ecd8" font-weight="bold">A</text>
  <text x="127" y="128" font-size="11" fill="#f4ecd8" font-weight="bold">A</text>
  <!-- defender counter -->
  <rect x="140" y="148" width="32" height="32" rx="4" fill="#7a2222" stroke="#f4ecd8" stroke-width="2"/>
  <text x="156" y="170" font-size="11" fill="#f4ecd8" font-weight="bold">D</text>
  <text x="135" y="252" text-anchor="middle" font-size="12" fill="#3a3326" font-weight="bold">Ambos bandos en el mismo hex</text>

  <!-- flow -->
  <g font-size="13">
    <rect x="260" y="60" width="270" height="44" rx="8" fill="#6b705c" stroke="#2b2b2b"/>
    <text x="395" y="80" text-anchor="middle" fill="#f4ecd8" font-weight="bold">1 · Proporción de fuerzas</text>
    <text x="395" y="97" text-anchor="middle" fill="#f4ecd8" font-size="11">suma la FP de cada bando (p. ej. 2 a 1)</text>

    <rect x="260" y="116" width="270" height="44" rx="8" fill="#6b705c" stroke="#2b2b2b"/>
    <text x="395" y="136" text-anchor="middle" fill="#f4ecd8" font-weight="bold">2 · Tira 2d6 vs. nº para matar</text>
    <text x="395" y="153" text-anchor="middle" fill="#f4ecd8" font-size="11">mejor proporción = más fácil (tabla 20.3)</text>

    <rect x="260" y="172" width="270" height="58" rx="8" fill="#bf4e30" stroke="#2b2b2b"/>
    <text x="395" y="194" text-anchor="middle" fill="#f4ecd8" font-weight="bold">3 · Resultado</text>
    <text x="395" y="212" text-anchor="middle" fill="#f4ecd8" font-size="11">bajas DIRECTAS · sin efecto · sigue el melee</text>
  </g>
  <g stroke="#3a3326" stroke-width="2.5" marker-end="url(#arC)">
    <line x1="395" y1="104" x2="395" y2="114"/>
    <line x1="395" y1="160" x2="395" y2="170"/>
  </g>
  <defs><marker id="arC" markerWidth="9" markerHeight="9" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3a3326"/></marker></defs>

  <text x="280" y="280" text-anchor="middle" font-size="13" fill="#3a3326" font-weight="bold">Sin chequeo de moral: aquí hay muertos. El líder y el terreno influyen.</text>
  <text x="280" y="302" text-anchor="middle" font-size="12" font-style="italic" fill="#7a5230">Es como se desaloja a quien está atrincherado en un edificio.</text>
</svg>

# Secciones EXTRA (material didáctico propio): se sirven en /squad-leader/extra/.
# La página principal es el reglamento (ver reglamento/mkdocs.yml).
# Los capítulos didácticos antiguos están archivados en _borrador-guia/ (sin publicar):
# el reglamento ya cubre esas reglas; aquí solo va lo que aporta de nuevo.
site_name: Squad Leader — Aprende a jugar
site_description: Escenarios de práctica, juego en solitario, referencia rápida y recursos para Squad Leader (Avalon Hill, 1977).
site_author: Alex Santolaria
site_url: https://asantolaria.github.io/squad-leader/extra/
docs_dir: extra
site_dir: site/extra

exclude_docs: |
  _borrador-guia/

theme:
  name: material
  language: es
  icon:
    logo: material/chess-rook
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search:
      lang: es

nav:
  - Inicio: index.md
  - Jugar en solitario: 12-jugar-en-solitario.md
  - Escenario de práctica (infantería): 13-escenario-de-practica.md
  - Escenario con carro: 13b-escenario-con-carro.md
  - Referencia rápida (mesa): 10-referencia-rapida.md
  - Recursos y comunidad: 14-recursos-y-comunidad.md
  - 📖 Reglamento completo: https://asantolaria.github.io/squad-leader/

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 470" font-family="Georgia, 'Times New Roman', serif">
  <rect x="0" y="0" width="580" height="470" rx="12" fill="#f4ecd8" stroke="#c8b88a" stroke-width="2"/>
  <text x="290" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#3a3326">Procedimiento de fuego de infantería</text>

  <defs>
    <marker id="arF" markerWidth="9" markerHeight="9" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3a3326"/></marker>
  </defs>

  <g font-size="15">
    <rect x="120" y="52" width="340" height="46" rx="8" fill="#8a6d3b" stroke="#2b2b2b"/>
    <text x="290" y="80" text-anchor="middle" fill="#f4ecd8" font-weight="bold">1 · ¿Hay línea de visión?</text>

    <rect x="120" y="118" width="340" height="46" rx="8" fill="#6b705c" stroke="#2b2b2b"/>
    <text x="290" y="146" text-anchor="middle" fill="#f4ecd8">2 · Suma la potencia de fuego (FP)</text>

    <rect x="120" y="184" width="340" height="46" rx="8" fill="#6b705c" stroke="#2b2b2b"/>
    <text x="290" y="206" text-anchor="middle" fill="#f4ecd8">3 · Multiplica la FP</text>
    <text x="290" y="223" text-anchor="middle" fill="#f4ecd8" font-size="11">×2 adyacente · ×½ larga dist. / movimiento / área</text>

    <rect x="120" y="250" width="340" height="46" rx="8" fill="#6b705c" stroke="#2b2b2b"/>
    <text x="290" y="278" text-anchor="middle" fill="#f4ecd8">4 · Localiza la columna en la Tabla de Fuego</text>

    <rect x="120" y="316" width="340" height="46" rx="8" fill="#6b705c" stroke="#2b2b2b"/>
    <text x="290" y="338" text-anchor="middle" fill="#f4ecd8">5 · Modificadores a la tirada (terreno)</text>
    <text x="290" y="355" text-anchor="middle" fill="#f4ecd8" font-size="11">cobertura = + (peor tirador) · al descubierto = −</text>

    <rect x="120" y="382" width="340" height="56" rx="8" fill="#bf4e30" stroke="#2b2b2b"/>
    <text x="290" y="406" text-anchor="middle" fill="#f4ecd8" font-weight="bold">6 · Tira 2d6 → resultado</text>
    <text x="290" y="426" text-anchor="middle" fill="#f4ecd8" font-size="12">— nada · M chequeo · nº chequeo agravado · KIA baja</text>
  </g>

  <g stroke="#3a3326" stroke-width="2.5" marker-end="url(#arF)">
    <line x1="290" y1="98" x2="290" y2="116"/>
    <line x1="290" y1="164" x2="290" y2="182"/>
    <line x1="290" y1="230" x2="290" y2="248"/>
    <line x1="290" y1="296" x2="290" y2="314"/>
    <line x1="290" y1="362" x2="290" y2="380"/>
  </g>
</svg>

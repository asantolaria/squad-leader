<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="Georgia, 'Times New Roman', serif">
  <rect x="0" y="0" width="560" height="340" rx="12" fill="#f4ecd8" stroke="#c8b88a" stroke-width="2"/>
  <text x="280" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#3a3326">La altura y la línea de visión (corte de perfil)</text>

  <defs>
    <marker id="arG" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3a6b3a"/></marker>
    <marker id="arR2" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#bf4e30"/></marker>
  </defs>

  <!-- ===== Panel A: ver por encima ===== -->
  <text x="145" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a3326">Desde lo alto ves por encima</text>
  <!-- terrain -->
  <polygon points="30,250 70,250 110,175 155,175 195,250 270,250 270,300 30,300" fill="#b9a878" stroke="#6b5d3a" stroke-width="1.5"/>
  <!-- level lines -->
  <g stroke="#9a8a5a" stroke-width="0.8" stroke-dasharray="3 3">
    <line x1="30" y1="250" x2="270" y2="250"/><line x1="30" y1="212" x2="270" y2="212"/><line x1="30" y1="175" x2="270" y2="175"/>
  </g>
  <text x="36" y="247" font-size="10" fill="#6b5d3a">N0</text>
  <text x="36" y="209" font-size="10" fill="#6b5d3a">N1</text>
  <text x="36" y="172" font-size="10" fill="#6b5d3a">N2</text>
  <!-- woods obstacle -->
  <g fill="#33502a"><circle cx="225" cy="234" r="11"/><circle cx="240" cy="228" r="12"/><circle cx="215" cy="240" r="9"/></g>
  <!-- observer A on hill -->
  <rect x="118" y="158" width="26" height="26" rx="3" fill="#6b705c" stroke="#2b2b2b" stroke-width="2"/>
  <text x="131" y="176" text-anchor="middle" font-size="11" fill="#f4ecd8" font-weight="bold">A</text>
  <!-- target B beyond woods -->
  <rect x="248" y="224" width="24" height="24" rx="3" fill="#7a5230" stroke="#2b2b2b" stroke-width="2"/>
  <text x="260" y="241" text-anchor="middle" font-size="10" fill="#f4ecd8" font-weight="bold">B</text>
  <!-- LOS clears the woods -->
  <line x1="135" y1="160" x2="258" y2="226" stroke="#3a6b3a" stroke-width="2.5" marker-end="url(#arG)"/>
  <text x="145" y="318" text-anchor="middle" font-size="11" fill="#3a6b3a">A (nivel 2) ve a B por encima del bosque ✓</text>

  <!-- ===== Panel B: zona muerta ===== -->
  <text x="425" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a3326">…pero hay zonas muertas</text>
  <!-- terrain: hill then hollow -->
  <polygon points="305,180 360,180 410,255 455,242 530,250 530,300 305,300 305,180" fill="#b9a878" stroke="#6b5d3a" stroke-width="1.5"/>
  <g stroke="#9a8a5a" stroke-width="0.8" stroke-dasharray="3 3">
    <line x1="305" y1="250" x2="530" y2="250"/><line x1="305" y1="212" x2="530" y2="212"/><line x1="305" y1="180" x2="530" y2="180"/>
  </g>
  <!-- observer A on hilltop -->
  <rect x="322" y="160" width="26" height="26" rx="3" fill="#6b705c" stroke="#2b2b2b" stroke-width="2"/>
  <text x="335" y="178" text-anchor="middle" font-size="11" fill="#f4ecd8" font-weight="bold">A</text>
  <!-- dead zone shading (the hollow behind the crest) -->
  <polygon points="360,180 410,255 455,242 455,205" fill="#bf4e30" opacity="0.22"/>
  <!-- grazing sight line over the crest -->
  <line x1="335" y1="172" x2="470" y2="205" stroke="#bf4e30" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arR2)"/>
  <!-- hidden target -->
  <rect x="405" y="232" width="24" height="24" rx="3" fill="#7a5230" stroke="#2b2b2b" stroke-width="2" opacity="0.55"/>
  <text x="417" y="249" text-anchor="middle" font-size="10" fill="#f4ecd8" font-weight="bold">?</text>
  <text x="430" y="200" font-size="11" fill="#bf4e30" font-weight="bold">zona muerta</text>
  <text x="425" y="318" text-anchor="middle" font-size="11" fill="#bf4e30">el pie de la ladera queda oculto ✗</text>
</svg>
